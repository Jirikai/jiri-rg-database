<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="avatar.png">
<title>Jiri's RG Database</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0e0e0;--border2:#ccc;
  --tag-effect-bg:#d4edda;--tag-effect-text:#1a5c2a;
  --tag-scale-bg:#f0f0f0;--tag-scale-text:#444;
  --accent:#3a7bd5;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1e;--bg2:#252525;--bg3:#2e2e2e;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --border:#383838;--border2:#4a4a4a;
  --tag-effect-bg:#1a3d22;--tag-effect-text:#6dbb80;
  --tag-scale-bg:#2e2e2e;--tag-scale-text:#bbb;
  --accent:#5b9bd5;
}}
.force-light{--bg:#ffffff!important;--bg2:#f5f5f5!important;--bg3:#ebebeb!important;--text:#1a1a1a!important;--text2:#555!important;--text3:#888!important;--border:#e0e0e0!important;--border2:#ccc!important;--tag-effect-bg:#d4edda!important;--tag-effect-text:#1a5c2a!important;--tag-scale-bg:#f0f0f0!important;--tag-scale-text:#444!important;--accent:#3a7bd5!important}
.force-dark{--bg:#1e1e1e!important;--bg2:#252525!important;--bg3:#2e2e2e!important;--text:#e8e8e8!important;--text2:#aaa!important;--text3:#666!important;--border:#383838!important;--border2:#4a4a4a!important;--tag-effect-bg:#1a3d22!important;--tag-effect-text:#6dbb80!important;--tag-scale-bg:#2e2e2e!important;--tag-scale-text:#bbb!important;--accent:#5b9bd5!important}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);display:flex;flex-direction:column}
#site-header{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
#header-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);flex-shrink:0}
#header-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.2}
#header-sub{font-size:11px;color:var(--text3);margin-top:1px}
#theme-toggle{margin-left:auto;background:none;border:1px solid var(--border2);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:16px;color:var(--text);flex-shrink:0;transition:background .15s}
#theme-toggle:hover{background:var(--bg3)}
body{display:flex;flex-direction:column}
#app{display:grid;grid-template-columns:250px 1fr 310px;flex:1;min-height:0}
.panel{border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;background:var(--bg)}
.panel.right{border-right:none;border-left:1px solid var(--border)}
.panel-inner{flex:1;overflow-y:auto;padding:10px 10px 16px;scrollbar-width:none}
.panel-inner::-webkit-scrollbar{display:none}
.panel-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding:0 2px}
.center{display:flex;flex-direction:column;min-height:0;background:var(--bg)}
.search-bar{flex-shrink:0;padding:10px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.search-bar input{width:100%;padding:7px 11px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-meta{display:flex;justify-content:space-between;align-items:center}
.result-count{font-size:11px;color:var(--text3)}
.active-filters{flex-shrink:0;padding:7px 14px;border-bottom:1px solid var(--border);min-height:38px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.af-label{font-size:11px;color:var(--text3);flex-shrink:0}
.af-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);cursor:pointer;white-space:nowrap}
.af-chip:hover{background:var(--border2);color:var(--text)}
.af-chip-x{font-size:13px;line-height:1;opacity:.6}
.clear-all-btn{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:20px;padding:3px 9px;cursor:pointer;white-space:nowrap;margin-left:auto;flex-shrink:0}
.clear-all-btn:hover{color:var(--text)}
.pin-bar{flex-shrink:0;padding:7px 14px;border-bottom:1px solid var(--border);min-height:36px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.pin-label{font-size:11px;color:var(--text3);margin-right:2px;white-space:nowrap;flex-shrink:0}
.pin-hint{font-size:11px;color:var(--text3)}
.pin-chip{font-size:11px;padding:2px 8px;border-radius:20px;cursor:pointer;border:none;font-weight:600}
.pin-chip:hover{opacity:.75}
.cards{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;min-height:0}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 16px;cursor:pointer;transition:border-color .12s;flex-shrink:0}
.card:hover{border-color:var(--border2)}
.card.pinned{border-left-width:3px}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-icon{width:32px;height:32px;border-radius:4px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.card-icon-fb{width:32px;height:32px;border-radius:4px;flex-shrink:0}
.card-title-block{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.card-id-name{font-weight:700;font-size:15px;line-height:1.25;display:flex;align-items:baseline;gap:6px;flex:1;min-width:0}
.card-id-part{font-weight:800;font-size:12px;padding:1px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;letter-spacing:.03em}
.card-meta{display:none}
.card-cost{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;flex-shrink:0}
.card-cat{font-size:10px;color:var(--text3)}
.faction-badge{font-size:10px;padding:2px 7px 2px 5px;border-radius:20px;font-weight:700;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px}
.faction-badge img{width:16px;height:16px;object-fit:contain;image-rendering:pixelated}
.card-name-text{font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-effect{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:5px}
.card-formula{font-size:12px;color:var(--text3);font-family:'SF Mono',Consolas,monospace;margin-bottom:7px;word-break:break-word}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;white-space:nowrap}
.tag-effect{background:var(--tag-effect-bg);color:var(--tag-effect-text)}
.tag-scale{background:var(--tag-scale-bg);color:var(--tag-scale-text);border:1px solid var(--border)}
.no-results{text-align:center;color:var(--text3);font-size:13px;padding:48px 20px;line-height:1.8}
.faction-group{margin-bottom:8px}
.faction-group-lbl{font-size:11px;font-weight:700;color:var(--text3);padding:4px 4px 2px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.faction-btn{display:flex;align-items:center;gap:10px;width:100%;padding:5px 8px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;font-size:14px;color:var(--text);text-align:left}
.faction-btn:hover{background:var(--bg2)}
.faction-btn.active{background:var(--bg3);font-weight:600}
.faction-btn-icon{width:28px;height:28px;object-fit:contain;flex-shrink:0;image-rendering:pixelated}
.faction-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.filter-section{margin-bottom:8px}
.filter-group-lbl{font-size:11px;font-weight:700;color:var(--text3);padding:5px 2px 2px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;user-select:none}
.filter-group-lbl:hover{color:var(--text2)}
.arrow{font-size:9px;transition:transform .15s;display:inline-block;opacity:.6}
.arrow.open{transform:rotate(90deg)}
.filter-items{display:flex;flex-direction:column;gap:1px;margin-bottom:4px}
.filter-btn{display:flex;align-items:center;gap:7px;width:100%;padding:5px 6px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);text-align:left}
.filter-btn:hover{background:var(--bg2);color:var(--text)}
.filter-btn.active{background:var(--bg3);color:var(--text);font-weight:600}
.fcheck{width:14px;height:14px;border:1px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1}
.filter-btn.active .fcheck{background:var(--text);border-color:var(--text);color:var(--bg)}
.window-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.window-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;padding:0 2px}
.window-chips{display:flex;flex-wrap:wrap;gap:4px}
.w-chip{font-size:13px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2)}
.w-chip.active{background:var(--bg3);color:var(--text);font-weight:600}
.w-chip:hover{background:var(--bg2)}
.panel-header-row{display:flex;align-items:center;justify-content:space-between;padding:10px 10px 0;flex-shrink:0}
.panel-section-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.panel-clear-btn{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:20px;padding:2px 8px;cursor:pointer}
.panel-clear-btn:hover{color:var(--text);border-color:var(--border2)}
.panel-divider{border:none;border-top:1px solid var(--border);margin:8px 10px 0}
</style>
</head>
<body>
<header id="site-header">
  <img src="avatar.png" alt="Jiri" id="header-avatar">
  <div id="header-text">
    <div id="header-title">Jiri's RG Database</div>
    <div id="header-sub">Realm Grinder Upgrade Reference · 4.3</div>
  </div>
  <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
</header>
<div id="app">
  <div class="panel">
    <div class="panel-inner">
      <div class="panel-title">Faction</div>
      <div id="faction-list"></div>
    </div>
  </div>
  <div class="center">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search upgrades, effects, formulas...">
      <div class="search-meta"><span class="result-count" id="count">Loading...</span></div>
    </div>
    <div class="active-filters" id="active-filters"></div>
    <div class="pin-bar" id="pin-bar"></div>
    <div class="cards" id="cards"><div class="no-results">Loading upgrades...</div></div>
  </div>
  <div class="panel right">
    <div class="panel-header-row">
      <span class="panel-section-title">Filters</span>
      <button class="panel-clear-btn" onclick="clearRightPanel()">Clear filters</button>
    </div>
    <hr class="panel-divider">
    <div class="panel-inner">
      <div class="panel-title" style="margin-top:4px">Effects</div>
      <div id="effect-filters"></div>
      <div style="border-top:1px solid var(--border);margin:10px 0 8px"></div>
      <div class="panel-title">Scaling sources</div>
      <div id="scaling-filters"></div>
      <div class="window-section">
        <div class="window-lbl">Time window</div>
        <div class="window-chips" id="window-chips"></div>
      </div>
    </div>
  </div>
</div>

<script>
const FACTIONS=[
  {group:'Good',factions:['Fairy','Elven','Angel']},
  {group:'Evil',factions:['Goblin','Undead','Demon']},
  {group:'Neutral',factions:['Titan','Druid','Faceless']},
  {group:'Prestige',factions:['Dwarven','Drow','Dragon']},
  {group:'Mercenary',factions:['Mercenary']},
  {group:'Astral',factions:['Archon','Djinn','Makers']},
];
const ICONS={
  Fairy:'RG icons/FairyTradeTreaty.png',
  Elven:'RG icons/ElvenTradeTreaty.png',
  Angel:'RG icons/AngelTradeTreaty.png',
  Goblin:'RG icons/GoblinTradeTreaty.png',
  Undead:'RG icons/UndeadTradeTreaty.png',
  Demon:'RG icons/DemonTradeTreaty.png',
  Titan:'RG icons/TitanTradeTreaty.png',
  Druid:'RG icons/DruidTradeTreaty.png',
  Faceless:'RG icons/FacelessTradeTreaty.png',
  Dwarven:'RG icons/DwarvenTradeTreaty.png',
  Drow:'RG icons/DrowTradeTreaty.png',
  Dragon:'RG icons/DragonTradeTreaty.png',
  Mercenary:'RG icons/MercenaryFirstContract.png',
  Archon:'RG icons/ArchonTradeTreaty.png',
  Djinn:'RG icons/DjinnTradeTreaty.png',
  Makers:'RG icons/MakersTradeTreaty.png',
};
const FC={
  Fairy:{bg:'#e8609a',text:'#fff'},Elven:{bg:'#5aad4e',text:'#fff'},Angel:{bg:'#7ecfea',text:'#1a4a55'},
  Goblin:{bg:'#7a9e3b',text:'#fff'},Undead:{bg:'#4a4a8a',text:'#fff'},Demon:{bg:'#c93022',text:'#fff'},
  Titan:{bg:'#d4a817',text:'#5a3d00'},Druid:{bg:'#8b6340',text:'#fff'},Faceless:{bg:'#5c4a7a',text:'#fff'},
  Dwarven:{bg:'#2a5faa',text:'#fff'},Drow:{bg:'#a0256a',text:'#fff'},Dragon:{bg:'#2d6e2d',text:'#fff'},
  Mercenary:{bg:'#2e2e2e',text:'#eee'},Archon:{bg:'#5b9bd5',text:'#fff'},Djinn:{bg:'#a67fc4',text:'#fff'},
  Makers:{bg:'#b0b8c8',text:'#2a2a3a'},
};
const WINDOWS=['Era','Reincarnation','All Time'];
const EFFECT_GROUPS={
  'Production':{open:true,items:['All Buildings','Specific Buildings','Clicking Reward','Autoclick','Click Count','Gems Bonus','Building Cost Reduction','Excavation Cost Reduction','Royal Exchange Cost Reduction','Assistant Amount','Assistant Production','Offline Production']},
  'Mana & Spells':{open:true,items:['Max Mana','Mana Regeneration','Spell Duration','Spell Cost Reduction','Tax Collection']},
  'Faction Coins':{open:false,items:['FC Find Chance','FC Amount','Royal Exchange Production']},
};
const SCALING_GROUPS={
  'Buildings':{open:true,items:['Buildings Owned','Specific Building Count']},
  'Economy':{open:true,items:['Coins Owned','Faction Coins Found','Gems Owned','Royal Exchange Count','Assistants Owned']},
  'Spells & Mana':{open:false,items:['Max Mana','Mana Regeneration','Spells Cast','Active Spells','Spell Activity Time']},
  'Activity':{open:false,items:['Time Played','Offline Time','Clicks','Alignment Time']},
  'Misc':{open:false,items:['Reincarnations','Trophies','Artifacts Found','Lineage Level','Excavations']},
};

let UPGRADES=[];
let state={search:'',factions:new Set(),effects:new Set(),scalings:new Set(),windows:new Set(),pinned:[],eg:{},sg:{}};
Object.keys(EFFECT_GROUPS).forEach(g=>state.eg[g]=EFFECT_GROUPS[g].open);
Object.keys(SCALING_GROUPS).forEach(g=>state.sg[g]=SCALING_GROUPS[g].open);

const FACTION_FILES=[
  'fairy','elven','angel','goblin','undead','demon',
  'titan','druid','faceless','dwarven','drow','dragon',
  'mercenary','archon','djinn','makers'
];
Promise.all(FACTION_FILES.map(f=>fetch('data/'+f+'.json').then(r=>r.json())))
  .then(arrays=>{UPGRADES=arrays.flat();render();})
  .catch(e=>{document.getElementById('cards').innerHTML='<div class="no-results">Could not load faction data.</div>';console.error(e);});

function buildFactionList(){
  const el=document.getElementById('faction-list');el.innerHTML='';
  FACTIONS.forEach(({group,factions})=>{
    const w=document.createElement('div');w.className='faction-group';
    const l=document.createElement('div');l.className='faction-group-lbl';l.textContent=group;w.appendChild(l);
    factions.forEach(f=>{
      const c=FC[f]||{bg:'#888',text:'#fff'};
      const b=document.createElement('button');b.className='faction-btn'+(state.factions.has(f)?' active':'');
      const iconPart=ICONS[f]
        ?`<img src="${ICONS[f]}" class="faction-btn-icon" alt="" onerror="this.outerHTML='<span class=\\'faction-dot\\' style=\\'background:${c.bg}\\'></span>'">`
        :`<span class="faction-dot" style="background:${c.bg}"></span>`;
      b.innerHTML=`${iconPart}<span>${f}</span>`;
      b.onclick=()=>{state.factions.has(f)?state.factions.delete(f):state.factions.add(f);render();};
      w.appendChild(b);
    });
    el.appendChild(w);
  });
}

function buildWindowChips(){
  const el=document.getElementById('window-chips');el.innerHTML='';
  WINDOWS.forEach(w=>{
    const b=document.createElement('button');b.className='w-chip'+(state.windows.has(w)?' active':'');
    b.textContent=w;b.onclick=()=>{state.windows.has(w)?state.windows.delete(w):state.windows.add(w);render();};
    el.appendChild(b);
  });
}

function buildFilterPanel(groups,stateSet,stateOpen,id){
  const el=document.getElementById(id);el.innerHTML='';
  Object.entries(groups).forEach(([group,{items}])=>{
    const w=document.createElement('div');w.className='filter-section';
    const l=document.createElement('div');l.className='filter-group-lbl';
    l.innerHTML=`${group}<span class="arrow${stateOpen[group]?' open':''}">&#9654;</span>`;
    l.onclick=()=>{stateOpen[group]=!stateOpen[group];render();};w.appendChild(l);
    if(stateOpen[group]){
      const iw=document.createElement('div');iw.className='filter-items';
      items.forEach(item=>{
        const active=stateSet.has(item);
        const b=document.createElement('button');b.className='filter-btn'+(active?' active':'');
        b.innerHTML=`<span class="fcheck">${active?'&#10003;':''}</span>${item}`;
        b.onclick=()=>{active?stateSet.delete(item):stateSet.add(item);render();};
        iw.appendChild(b);
      });
      w.appendChild(iw);
    }
    el.appendChild(w);
  });
}

function buildActiveFilters(){
  const el=document.getElementById('active-filters');
  const chips=[];
  state.factions.forEach(f=>{const c=FC[f]||{bg:'#888',text:'#fff'};chips.push({label:f,style:`background:${c.bg};color:${c.text};border-color:${c.bg}`,remove:()=>state.factions.delete(f)});});
  state.effects.forEach(e=>chips.push({label:e,style:'',remove:()=>state.effects.delete(e)}));
  state.scalings.forEach(s=>chips.push({label:'↳ '+s,style:'',remove:()=>state.scalings.delete(s)}));
  state.windows.forEach(w=>chips.push({label:'⏱ '+w,style:'',remove:()=>state.windows.delete(w)}));
  if(!chips.length&&!state.search){el.innerHTML='<span class="af-label">No filters active</span>';return;}
  el.innerHTML='';
  chips.forEach(({label,style,remove})=>{
    const chip=document.createElement('span');chip.className='af-chip';
    if(style)chip.setAttribute('style',style);
    chip.innerHTML=`${label}<span class="af-chip-x">&times;</span>`;
    chip.onclick=()=>{remove();render();};el.appendChild(chip);
  });
  if(chips.length){
    const b=document.createElement('button');b.className='clear-all-btn';b.textContent='Clear all';b.onclick=clearAll;el.appendChild(b);
  } else if(state.search){
    el.innerHTML=`<span class="af-label">Searching: <em>${state.search}</em></span>`;
  }
}

function getFiltered(){
  return UPGRADES.filter(u=>{
    if(state.factions.size>0&&!state.factions.has(u.faction))return false;
    const q=state.search.toLowerCase();
    if(q){const hay=[u.name,u.id,u.faction,u.category||'',u.effect||'',u.formula||'',...(u.effects||[]),...(u.scaling||[])].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    if(state.effects.size>0&&![...state.effects].every(e=>(u.effects||[]).includes(e)))return false;
    if(state.scalings.size>0&&![...state.scalings].every(s=>(u.scaling||[]).includes(s)))return false;
    if(state.windows.size>0){if(!u.window||!u.window.length)return false;if(![...state.windows].some(w=>u.window.includes(w)))return false;}
    return true;
  });
}

function buildCards(filtered){
  const el=document.getElementById('cards');el.innerHTML='';
  if(!filtered.length){el.innerHTML='<div class="no-results">No upgrades match the current filters.</div>';return;}
  filtered.forEach(u=>{
    const pinned=state.pinned.includes(u.id);
    const c=FC[u.faction]||{bg:'#888',text:'#fff'};
    const card=document.createElement('div');card.className='card'+(pinned?' pinned':'');
    if(pinned)card.style.borderLeftColor=c.bg;
    card.onclick=()=>{pinned?state.pinned=state.pinned.filter(p=>p!==u.id):state.pinned.push(u.id);render();};
    const scalingTags=(u.scaling||[]).map((s,i)=>{
      const win=(u.window&&u.window[i])?' ('+u.window[i]+')':'';
      return`<span class="tag tag-scale">&#8627; ${s}${win}</span>`;
    }).join('');
    const iconSrc=ICONS[u.faction];
    const iconHtml=iconSrc
      ?`<img src="${iconSrc}" class="card-icon" alt="${u.faction}" onerror="this.style.display='none;this.nextSibling.style.display=\\'inline-block\\''">` 
      :`<span class="card-icon-fb" style="background:${c.bg}"></span>`;
    const badgeIconHtml=iconSrc
      ?`<img src="${iconSrc}" width="14" height="14" style="object-fit:contain;image-rendering:pixelated" alt="" onerror="this.style.display='none'">`
      :'';
    card.innerHTML=`
      <div class="card-header">
        ${iconHtml}
        <div class="card-title-block">
          <div class="card-id-name">
            <span class="card-id-part" style="background:${c.bg};color:${c.text}">${u.id}</span>
            <span class="card-name-text">${u.name}</span>
            ${u.cost?`<span class="card-cost">${u.cost}</span>`:''}
          </div>
        </div>
        <span class="faction-badge" style="background:${c.bg};color:${c.text}">${badgeIconHtml}${u.faction}</span>
      </div>
      <div class="card-effect">${u.effect||''}</div>
      ${u.formula?`<div class="card-formula">${u.formula}</div>`:''}
      <div class="card-tags">
        ${(u.effects||[]).map(e=>`<span class="tag tag-effect">${e}</span>`).join('')}
        ${scalingTags}
      </div>`;
    el.appendChild(card);
  });
}

function buildPinBar(){
  const el=document.getElementById('pin-bar');
  if(!state.pinned.length){el.innerHTML='<span class="pin-label">Build:</span><span class="pin-hint">Click a card to pin it</span>';return;}
  const chips=state.pinned.map(id=>{
    const u=UPGRADES.find(x=>x.id===id);if(!u)return'';
    const c=FC[u.faction]||{bg:'#888',text:'#fff'};
    return`<span class="pin-chip" style="background:${c.bg};color:${c.text}" onclick="event.stopPropagation();removePin('${id}')">${id} &times;</span>`;
  }).join('');
  el.innerHTML=`<span class="pin-label">Build:</span>${chips}`;
}

function removePin(id){state.pinned=state.pinned.filter(p=>p!==id);render();}
function clearAll(){state.search='';state.factions.clear();state.effects.clear();state.scalings.clear();state.windows.clear();document.getElementById('search').value='';render();}
function clearRightPanel(){state.effects.clear();state.scalings.clear();state.windows.clear();render();}

function render(){
  buildFactionList();buildWindowChips();
  buildFilterPanel(EFFECT_GROUPS,state.effects,state.eg,'effect-filters');
  buildFilterPanel(SCALING_GROUPS,state.scalings,state.sg,'scaling-filters');
  const f=getFiltered();
  document.getElementById('count').textContent=`${f.length} of ${UPGRADES.length} upgrades`;
  buildActiveFilters();buildCards(f);buildPinBar();
}

document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});

// Theme toggle
(function(){
  const saved=localStorage.getItem('rg-theme');
  if(saved==='light'){document.documentElement.classList.add('force-light');}
  else if(saved==='dark'){document.documentElement.classList.add('force-dark');}
  updateToggleIcon();
})();

function updateToggleIcon(){
  const btn=document.getElementById('theme-toggle');
  if(!btn)return;
  const isDark=document.documentElement.classList.contains('force-dark')||
    (!document.documentElement.classList.contains('force-light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  btn.textContent=isDark?'☀️':'🌙';
}

function toggleTheme(){
  const el=document.documentElement;
  const isDark=el.classList.contains('force-dark')||
    (!el.classList.contains('force-light')&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  if(isDark){
    el.classList.remove('force-dark');el.classList.add('force-light');
    localStorage.setItem('rg-theme','light');
  } else {
    el.classList.remove('force-light');el.classList.add('force-dark');
    localStorage.setItem('rg-theme','dark');
  }
  updateToggleIcon();
}
</script>
</body>
</html>
