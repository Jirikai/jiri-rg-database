<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RG Upgrade Database</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0e0e0;--border2:#ccc;
  --tag-effect-bg:#d4edda;--tag-effect-text:#1a5c2a;
  --tag-scale-bg:#f0f0f0;--tag-scale-text:#444;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1e;--bg2:#252525;--bg3:#2e2e2e;
  --text:#e8e8e8;--text2:#aaa;--text3:#666;
  --border:#383838;--border2:#4a4a4a;
  --tag-effect-bg:#1a3d22;--tag-effect-text:#6dbb80;
  --tag-scale-bg:#2e2e2e;--tag-scale-text:#bbb;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden}
#app{display:grid;grid-template-columns:170px 1fr 210px;height:100vh}
.panel{border-right:1px solid var(--border);overflow-y:auto;padding:10px 8px;background:var(--bg)}
.panel:last-child{border-right:none;border-left:1px solid var(--border)}
.panel-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 4px}
/* center */
.center{border-right:none;padding:0;display:flex;flex-direction:column;background:var(--bg)}
.search-bar{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.search-bar input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;outline:none}
.search-bar input:focus{border-color:#888}
.search-meta{display:flex;justify-content:space-between;align-items:center}
.result-count{font-size:11px;color:var(--text3)}
.clear-btn{font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;text-decoration:underline}
.clear-btn:hover{color:var(--text)}
.pin-bar{padding:7px 12px;border-bottom:1px solid var(--border);min-height:36px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.pin-label{font-size:11px;color:var(--text3);margin-right:2px;white-space:nowrap}
.pin-hint{font-size:11px;color:var(--text3)}
.pin-chip{font-size:11px;padding:2px 8px;border-radius:20px;cursor:pointer;border:none;font-weight:500}
.pin-chip:hover{opacity:.75}
.cards{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
/* cards */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px;cursor:pointer;transition:border-color .12s}
.card:hover{border-color:var(--border2)}
.card.pinned{border-left-width:3px}
.card-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.card-name{font-weight:600;font-size:13px;flex:1;min-width:0}
.faction-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.card-id{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.card-cost{font-size:10px;color:var(--text3);margin-left:auto;white-space:nowrap;flex-shrink:0}
.card-effect{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:4px}
.card-formula{font-size:11px;color:var(--text3);font-family:'SF Mono',Consolas,monospace;margin-bottom:7px;word-break:break-word}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap}
.tag-effect{background:var(--tag-effect-bg);color:var(--tag-effect-text)}
.tag-scale{background:var(--tag-scale-bg);color:var(--tag-scale-text);border:1px solid var(--border)}
.no-results{text-align:center;color:var(--text3);font-size:13px;padding:48px 20px;line-height:1.8}
.loading{text-align:center;color:var(--text3);font-size:13px;padding:48px 20px}
/* faction panel */
.faction-group{margin-bottom:10px}
.faction-group-lbl{font-size:10px;font-weight:600;color:var(--text3);padding:2px 4px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.faction-btn{display:flex;align-items:center;gap:7px;width:100%;padding:4px 6px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--text);text-align:left}
.faction-btn:hover{background:var(--bg2)}
.faction-btn.active{background:var(--bg3);font-weight:600}
.faction-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* right panel */
.window-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.w-chip{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2)}
.w-chip.active{background:var(--bg3);color:var(--text);border-color:var(--border2);font-weight:600}
.w-chip:hover{background:var(--bg2)}
.filter-section{margin-bottom:10px}
.filter-group-lbl{font-size:10px;font-weight:600;color:var(--text3);padding:2px 4px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;user-select:none}
.filter-group-lbl:hover{color:var(--text2)}
.arrow{font-size:9px;transition:transform .15s;display:inline-block}
.arrow.open{transform:rotate(90deg)}
.filter-items{display:flex;flex-direction:column;gap:2px}
.filter-btn{display:flex;align-items:center;gap:5px;width:100%;padding:3px 5px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--text2);text-align:left}
.filter-btn:hover{background:var(--bg2);color:var(--text)}
.filter-btn.active{background:var(--bg3);color:var(--text);font-weight:600}
.fcheck{width:12px;height:12px;border:1px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px}
.filter-btn.active .fcheck{background:var(--text);border-color:var(--text);color:var(--bg)}
</style>
</head>
<body>
<div id="app">
  <div class="panel" id="left-panel">
    <div class="panel-title">Faction</div>
    <div id="faction-list"></div>
  </div>
  <div class="center">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search upgrades, effects, formulas...">
      <div class="search-meta">
        <span class="result-count" id="count">Loading...</span>
        <button class="clear-btn" onclick="clearAll()">Clear all filters</button>
      </div>
    </div>
    <div class="pin-bar" id="pin-bar"></div>
    <div class="cards" id="cards"><div class="loading">Loading upgrades...</div></div>
  </div>
  <div class="panel" id="right-panel">
    <div class="panel-title" style="margin-bottom:6px">Effects</div>
    <div id="effect-filters"></div>
    <div style="border-top:1px solid var(--border);margin:10px 0 8px"></div>
    <div class="panel-title" style="margin-bottom:4px">Scaling sources</div>
    <div class="window-chips" id="window-chips"></div>
    <div id="scaling-filters"></div>
  </div>
</div>

<script>
const FACTIONS=[
  {group:'Good',factions:['Fairy','Elven','Angel']},
  {group:'Evil',factions:['Goblin','Undead','Demon']},
  {group:'Neutral',factions:['Titan','Druid','Faceless']},
  {group:'Prestige',factions:['Dwarven','Drow','Dragon']},
  {group:'Mercenary',factions:['Mercenary']},
  {group:'Astral',factions:['Archon','Djinn','Makers']},
];
const FC={
  Fairy:    {bg:'#e8609a',text:'#fff'},
  Elven:    {bg:'#5aad4e',text:'#fff'},
  Angel:    {bg:'#7ecfea',text:'#1a4a55'},
  Goblin:   {bg:'#7a9e3b',text:'#fff'},
  Undead:   {bg:'#4a4a8a',text:'#fff'},
  Demon:    {bg:'#c93022',text:'#fff'},
  Titan:    {bg:'#d4a817',text:'#5a3d00'},
  Druid:    {bg:'#8b6340',text:'#fff'},
  Faceless: {bg:'#5c4a7a',text:'#fff'},
  Dwarven:  {bg:'#2a5faa',text:'#fff'},
  Drow:     {bg:'#a0256a',text:'#fff'},
  Dragon:   {bg:'#2d6e2d',text:'#fff'},
  Mercenary:{bg:'#2e2e2e',text:'#eee'},
  Archon:   {bg:'#5b9bd5',text:'#fff'},
  Djinn:    {bg:'#a67fc4',text:'#fff'},
  Makers:   {bg:'#b0b8c8',text:'#2a2a3a'},
};
const WINDOWS=['Era','Reincarnation','All Time','Current'];
const EFFECT_GROUPS={
  'Production':{open:true,items:['All Buildings','Specific Buildings','Unique Buildings','Click Reward','Building Cost Reduction']},
  'Mana & Spells':{open:false,items:['Max Mana','Mana Regen','Spell Duration','Spell Cost','Autoclick']},
  'Faction Coins':{open:false,items:['FC Find Chance','Tax Collection Worth','Triggered Tax Collections']},
  'Assistants':{open:false,items:['Assistant Count','Assistant Production']},
  'Offline':{open:false,items:['Offline Production','Offline Gains']},
  'Royal Exchange':{open:false,items:['Royal Exchange Bonus']},
  'Research':{open:false,items:['Research Budget']},
};
const SCALING_GROUPS={
  'Buildings':{open:true,items:['Buildings Owned','Specific Building Count','Unique Buildings Built','Highest Buildings Built']},
  'Coins & Gems':{open:true,items:['FC Found','FC Spent','Gems Owned','Coins Owned','Tax Collection Casts']},
  'Mana & Spells':{open:false,items:['Mana Produced','Max Mana','Mana Regen','Spell Casts','Spell Activity Time','Active Spells']},
  'Activity':{open:false,items:['Clicks','Time Played','Offline Time','Excavation Depth','Assistants Owned']},
  'Progression':{open:false,items:['Reincarnations','Trophies','Artifacts Found','Royal Exchanges','Research Points','Lineage Level']},
  'Misc':{open:false,items:['Flat Bonus','Random']},
};

let UPGRADES=[];
let state={search:'',factions:new Set(),effects:new Set(),scalings:new Set(),windows:new Set(),pinned:[],eg:{},sg:{}};
Object.keys(EFFECT_GROUPS).forEach(g=>state.eg[g]=EFFECT_GROUPS[g].open);
Object.keys(SCALING_GROUPS).forEach(g=>state.sg[g]=SCALING_GROUPS[g].open);

fetch('data.json').then(r=>r.json()).then(data=>{
  UPGRADES=data;
  render();
}).catch(()=>{
  document.getElementById('cards').innerHTML='<div class="no-results">Could not load data.json.<br>Make sure it is in the same folder as index.html.</div>';
});

function buildFactionList(){
  const el=document.getElementById('faction-list');el.innerHTML='';
  FACTIONS.forEach(({group,factions})=>{
    const wrap=document.createElement('div');wrap.className='faction-group';
    const lbl=document.createElement('div');lbl.className='faction-group-lbl';lbl.textContent=group;
    wrap.appendChild(lbl);
    factions.forEach(f=>{
      const c=FC[f]||{bg:'#888',text:'#fff'};
      const btn=document.createElement('button');
      btn.className='faction-btn'+(state.factions.has(f)?' active':'');
      btn.innerHTML=`<span class="faction-dot" style="background:${c.bg}"></span>${f}`;
      btn.onclick=()=>{state.factions.has(f)?state.factions.delete(f):state.factions.add(f);render();};
      wrap.appendChild(btn);
    });
    el.appendChild(wrap);
  });
}

function buildWindowChips(){
  const el=document.getElementById('window-chips');el.innerHTML='';
  WINDOWS.forEach(w=>{
    const b=document.createElement('button');
    b.className='w-chip'+(state.windows.has(w)?' active':'');
    b.textContent=w;
    b.onclick=()=>{state.windows.has(w)?state.windows.delete(w):state.windows.add(w);render();};
    el.appendChild(b);
  });
}

function buildFilterPanel(groups,stateSet,stateOpen,containerId){
  const el=document.getElementById(containerId);el.innerHTML='';
  Object.entries(groups).forEach(([group,{items}])=>{
    const wrap=document.createElement('div');wrap.className='filter-section';
    const lbl=document.createElement('div');lbl.className='filter-group-lbl';
    lbl.innerHTML=`${group}<span class="arrow${stateOpen[group]?' open':''}">&#9654;</span>`;
    lbl.onclick=()=>{stateOpen[group]=!stateOpen[group];render();};
    wrap.appendChild(lbl);
    if(stateOpen[group]){
      const iw=document.createElement('div');iw.className='filter-items';
      items.forEach(item=>{
        const active=stateSet.has(item);
        const btn=document.createElement('button');
        btn.className='filter-btn'+(active?' active':'');
        btn.innerHTML=`<span class="fcheck">${active?'&#10003;':''}</span>${item}`;
        btn.onclick=()=>{active?stateSet.delete(item):stateSet.add(item);render();};
        iw.appendChild(btn);
      });
      wrap.appendChild(iw);
    }
    el.appendChild(wrap);
  });
}

function getFiltered(){
  return UPGRADES.filter(u=>{
    if(state.factions.size>0&&!state.factions.has(u.faction))return false;
    const q=state.search.toLowerCase();
    if(q){const hay=[u.name,u.faction,u.effect,u.formula,...(u.effects||[]),...(u.scaling||[])].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    if(state.effects.size>0&&![...state.effects].every(e=>(u.effects||[]).includes(e)))return false;
    if(state.scalings.size>0&&![...state.scalings].every(s=>(u.scaling||[]).includes(s)))return false;
    if(state.windows.size>0){if(!u.window||u.window.length===0)return false;if(![...state.windows].some(w=>u.window.includes(w)))return false;}
    return true;
  });
}

function buildCards(filtered){
  const el=document.getElementById('cards');el.innerHTML='';
  if(!filtered.length){el.innerHTML='<div class="no-results">No upgrades match the current filters.</div>';return;}
  filtered.forEach(u=>{
    const pinned=state.pinned.includes(u.id);
    const c=FC[u.faction]||{bg:'#888',text:'#fff'};
    const card=document.createElement('div');
    card.className='card'+(pinned?' pinned':'');
    if(pinned)card.style.borderLeftColor=c.bg;
    card.onclick=()=>{pinned?state.pinned=state.pinned.filter(p=>p!==u.id):state.pinned.push(u.id);render();};
    const scalingTags=(u.scaling||[]).map((s,i)=>`<span class="tag tag-scale">&#8627; ${s}${u.window&&u.window[i]?' ('+u.window[i]+')':''}</span>`).join('');
    card.innerHTML=`
      <div class="card-header">
        <span class="card-name">${u.name}</span>
        <span class="faction-badge" style="background:${c.bg};color:${c.text}">${u.faction}</span>
        <span class="card-id">${u.id}</span>
        <span class="card-cost">${u.cost||''}</span>
      </div>
      <div class="card-effect">${u.effect||''}</div>
      <div class="card-formula">${u.formula||''}</div>
      <div class="card-tags">
        ${(u.effects||[]).map(e=>`<span class="tag tag-effect">${e}</span>`).join('')}
        ${scalingTags}
      </div>`;
    el.appendChild(card);
  });
}

function buildPinBar(){
  const el=document.getElementById('pin-bar');
  if(!state.pinned.length){el.innerHTML='<span class="pin-label">Build:</span><span class="pin-hint">Click a card to pin it</span>';return;}
  const chips=state.pinned.map(id=>{
    const u=UPGRADES.find(x=>x.id===id);if(!u)return'';
    const c=FC[u.faction]||{bg:'#888',text:'#fff'};
    return`<span class="pin-chip" style="background:${c.bg};color:${c.text}" onclick="event.stopPropagation();removePin('${id}')">${id} &times;</span>`;
  }).join('');
  el.innerHTML=`<span class="pin-label">Build:</span>${chips}`;
}

function removePin(id){state.pinned=state.pinned.filter(p=>p!==id);render();}

function clearAll(){
  state.search='';state.factions.clear();state.effects.clear();state.scalings.clear();state.windows.clear();
  document.getElementById('search').value='';render();
}

function render(){
  buildFactionList();buildWindowChips();
  buildFilterPanel(EFFECT_GROUPS,state.effects,state.eg,'effect-filters');
  buildFilterPanel(SCALING_GROUPS,state.scalings,state.sg,'scaling-filters');
  const f=getFiltered();
  document.getElementById('count').textContent=`${f.length} of ${UPGRADES.length} upgrades`;
  buildCards(f);buildPinBar();
}

document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});
</script>
</body>
</html>
